# Lokális dev stack — TELJESEN független az éles n8n/Qdrant rendszertől.
# Saját Qdrant konténer (NEM az éles cx_chatbot!). Indítás:
#   docker compose -f docker-compose.local.yml up -d --build
# Az api a .env-ből olvas (DATABASE_URL/REDIS_URL/QDRANT_URL a konténer-hálón belüli hostnevekkel).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cx
      POSTGRES_PASSWORD: cx
      POSTGRES_DB: cx
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    healthcheck:
      # a hivatalos qdrant image-ben nincs curl; a TCP-port nyitottsága a jel
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      # a konténer-hálón a service-nevek a hostok (a .env localhost-jait felülírjuk)
      DATABASE_URL: postgresql+asyncpg://cx:cx@postgres:5432/cx
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      # a seed-adat és a scriptek konténerből futtathatók (a host gépen nincs pip)
      - ./seed:/app/seed:ro
      - ./scripts:/app/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    # induláskor migrál, majd indítja az API-t
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
